<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAO Armoire Électrique S3D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#E8E6E3;color:#1A1A18;font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{display:flex;flex-direction:column;gap:8px;padding:10px;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between}
h1{font-size:14px;font-weight:600;letter-spacing:-.01em}
/* Toolbar */
#tb{display:flex;gap:5px;flex-wrap:wrap;align-items:center;background:#fff;padding:7px 10px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.09)}
#tb label{font-size:11px;color:#555;display:flex;align-items:center;gap:3px;white-space:nowrap}
#tb select,#tb input[type=number]{font-size:11px;padding:3px 5px;border:.5px solid #D5D3CF;border-radius:6px;background:#FAFAFA;color:#1A1A18}
#sel-model{width:90px}.n48{width:48px}
.tbtn{font-size:11px;padding:4px 10px;border-radius:7px;border:.5px solid #D5D3CF;background:#FAFAFA;cursor:pointer;color:#1A1A18;font-weight:500;white-space:nowrap;transition:background .1s}
.tbtn:hover{background:#EDE9E4}.tbtn.on{background:#EBF3FF;color:#185FA5;border-color:#5B9FD4}
.tbtn.red{color:#B92B27}.tbtn.red:hover{background:#FFF0EF;border-color:#E07070}
.tbtn.wire-on{background:#FFF5E0;color:#A06000;border-color:#D4A000}
.tbtn.door-on{background:#F0EBF8;color:#6B3DA6;border-color:#9B6DD6}
.sep{width:1px;height:20px;background:#D5D3CF;margin:0 1px;flex-shrink:0}
/* Layout */
#main{display:flex;gap:8px;flex:1;min-height:0}
/* Library */
#lib{width:158px;flex-shrink:0;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.09);padding:8px;overflow-y:auto;display:flex;flex-direction:column}
.lib-sec{font-size:9px;font-weight:700;color:#BBBBBB;text-transform:uppercase;letter-spacing:.07em;margin:9px 0 4px;padding-bottom:3px;border-bottom:1px solid #EEECEA;flex-shrink:0}
.lib-sec:first-child{margin-top:0}
.lib-item{border:.5px solid #E5E4E0;border-radius:7px;margin-bottom:3px;padding:4px 6px;cursor:grab;background:#FAFAF8;display:flex;align-items:center;gap:5px;transition:all .1s;flex-shrink:0}
.lib-item:hover{background:#EBF3FF;border-color:#5B9FD4}
.li-chip{width:6px;border-radius:2px;align-self:stretch;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:9px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
/* Views */
#views-area{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;overflow:auto}
canvas{display:block;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1),0 0 0 .5px rgba(0,0,0,.08);background:#fff}
/* Wiring panel */
#wp{width:224px;flex-shrink:0;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.09);display:flex;flex-direction:column;overflow:hidden}
.wp-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 5px;border-bottom:.5px solid #EEECEA;flex-shrink:0}
.wp-title{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em}
.wp-btn{font-size:10px;padding:2px 7px;border-radius:5px;border:.5px solid #D5D3CF;background:#FAFAFA;cursor:pointer;color:#444;font-weight:500}
.wp-btn:hover{background:#EDE9E4}
#wt-wrap{flex:1;overflow-y:auto}
#wt{width:100%;border-collapse:collapse;font-size:10px}
#wt th{background:#F4F3F0;color:#777;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.03em;padding:3px 4px;text-align:left;border-bottom:.5px solid #E0DEDB;position:sticky;top:0;white-space:nowrap}
#wt td{padding:2px 3px;border-bottom:.5px solid #F0EFEB;color:#333;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#wt td.editable{cursor:pointer}#wt td.editable:hover{background:#EBF3FF}
#wt td select,#wt td input[type=color]{font-size:9px;border:none;background:transparent;cursor:pointer;padding:0}
.wclr{display:inline-block;width:14px;height:14px;border-radius:3px;border:.5px solid #999;cursor:pointer;vertical-align:middle}
#wt tr.hl td{background:#FFF5E0;color:#7A4800}
#wt tr:hover td{background:#F8F7F4;cursor:pointer}
.wlabel{font-weight:700;color:#185FA5}
/* Info */
#info{font-size:10px;color:#AAA8A4;padding:4px 10px;background:#fff;border-radius:7px;box-shadow:0 1px 2px rgba(0,0,0,.05);flex-shrink:0}
/* Onglets vues */
#view-tabs{display:flex;gap:4px;flex-shrink:0;padding:2px 0}
.vtab{font-size:10px;padding:3px 9px;border-radius:6px;border:.5px solid #D5D3CF;background:#FAFAFA;cursor:pointer;color:#555;font-weight:500;transition:all .1s}
.vtab:hover{background:#EDE9E4}.vtab.on{background:#EBF3FF;color:#185FA5;border-color:#5B9FD4}
/* Collapse panneaux */
#lib{transition:width .18s,padding .18s}
#lib.collapsed{width:22px;padding:4px 2px;overflow:hidden}
#lib.collapsed>*:not(.panel-toggle){display:none}
#wp{transition:width .18s}
#wp.collapsed{width:22px;overflow:hidden}
#wp.collapsed>*:not(.panel-toggle){display:none}
.panel-toggle{width:100%;font-size:10px;padding:3px 4px;border-radius:5px;border:.5px solid #D5D3CF;background:#F0F0EC;cursor:pointer;color:#666;text-align:center;flex-shrink:0;writing-mode:horizontal-tb}
#lib.collapsed .panel-toggle,#wp.collapsed .panel-toggle{writing-mode:vertical-lr;padding:6px 2px;border-radius:5px;font-size:9px}
/* Poignées de redimensionnement */
.resize-h{width:6px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center;background:transparent;border-radius:3px;transition:background .1s}
.resize-h:hover,.resize-h.dragging{background:rgba(24,95,165,.18)}
.resize-h::after{content:'⋮';font-size:14px;color:#C0C0C0;user-select:none}
/* Bibliothèque — menus déroulants */
#lib-search{width:100%;box-sizing:border-box;font-size:11px;padding:4px 7px;border:.5px solid #D5D3CF;border-radius:6px;background:#FAFAFA;color:#1A1A18;margin-bottom:5px;flex-shrink:0}
#lib-search:focus{outline:none;border-color:#5B9FD4;background:#fff}
.lib-brand-hdr{font-size:10px;font-weight:700;padding:4px 7px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin:3px 0 1px;user-select:none;flex-shrink:0}
.lib-brand-hdr:hover{opacity:.85}
.lib-brand-hdr .arrow{font-size:9px;transition:transform .15s}
.lib-brand-hdr.open .arrow{transform:rotate(90deg)}
.lib-brand-body{display:flex;flex-direction:column;gap:0;overflow:hidden;max-height:0;transition:max-height .2s ease}
.lib-brand-body.open{max-height:2000px}
.lib-cat-hdr{font-size:9px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px 1px;margin-top:3px;cursor:pointer;display:flex;justify-content:space-between;flex-shrink:0}
.lib-cat-hdr:hover{color:#444}
.lib-cat-body{display:flex;flex-direction:column;gap:0}
.lib-cat-body.hidden{display:none}
.conn-badge{font-size:7px;font-weight:700;padding:1px 3px;border-radius:3px;margin-left:3px;vertical-align:middle}
.badge-xp{background:#FFF3CD;color:#856404;border:.5px solid #E0A800}
.badge-xe{background:#D1ECF1;color:#0C5460;border:.5px solid #17A2B8}
.lib-ref{font-size:8px;color:#AAA;display:block;margin-top:1px;font-family:monospace}
/* Plate drop zone highlight */
canvas.pe-drop-target{outline:2px dashed #E85C00;outline-offset:2px}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
  <h1>CAO Armoire Électrique — Spacial S3D</h1>
  <div style="display:flex;gap:10px;align-items:center">
  <span id="_save_lbl" style="font-size:9px;color:#AAA"></span>
  <span id="_zoom_lbl" style="font-size:9px;color:#AAA;cursor:pointer" title="Ctrl+0 = réinitialiser zoom" onclick="faceZoom=1;document.getElementById('_zoom_lbl').textContent='100%';draw()">100%</span>
  <div style="display:flex;gap:6px;font-size:9.5px;color:#888;align-items:center">
    <span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#FAECE7;border:1px solid #D85A30"></span>Goulotte</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#E8E8E8;border:1px solid #909090"></span>Rail DIN</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#606060;border:1px solid #404040"></span>Presse-étoupe</span>
  </div>
  </div>
</div>
<div id="tb">
  <label>Modèle <select id="sel-model">
    <option value="600x1200" selected>600×1200</option>
    <option value="600x800">600×800</option>
    <option value="800x1200">800×1200</option>
    <option value="800x800">800×800</option>
    <option value="600x600">600×600</option>
  </select></label>
  <label>Rails app <input type="number" id="nb-app" value="4" min="1" max="10" class="n48" title="Rails appareillage (haut)"></label>
  <label>Rails born <input type="number" id="nb-born" value="2" min="0" max="6" class="n48" title="Rails borniers (bas)"></label>
  <label>GH mm <input type="number" id="gh-h" value="40" min="20" max="200" class="n48" title="Hauteur goulottes horizontales"></label>
  <label>Esp.rails <input type="number" id="esp-r" value="20" min="0" max="50" class="n48"></label>
  <label>Ép.fond <input type="number" id="thickness" value="90" min="60" max="150" class="n48"></label>
  <div class="sep"></div>
  <button class="tbtn on" id="btn-cotes" onclick="tog('cotes')">Cotations</button>
  <button class="tbtn on" id="btn-capots" onclick="tog('capots')">Capots</button>
  <div class="sep"></div>
  <label>mm² <select id="sel-fil">
    <option value="1.5">1.5</option>
    <option value="2.5" selected>2.5</option>
    <option value="6">6</option>
    <option value="10">10</option>
    <option value="16">16</option>
  </select></label>
  <button class="tbtn" id="btn-fil" onclick="togWire()">⚡ Tracer fil</button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-door" onclick="togDoor()">🚪 Porte</button>
  <div class="sep"></div>
  <label title="Longueur câble joint de porte pour voyants">Joint porte <input type="number" id="door-gap" value="500" min="100" max="3000" class="n48"> mm</label>
  <div class="sep"></div>
  <button class="tbtn red" onclick="clearAll()">Vider</button>
  <button class="tbtn" onclick="exportBOM()" title="Exporter nomenclature (BOM)">BOM</button>
  <button class="tbtn" onclick="if(confirm('Effacer la session sauvegardée ?')){localStorage.removeItem(\'ep_v2\');location.reload();}">↺ Session</button>
  <button class="tbtn" onclick="exportHTML()">HTML</button>
</div>
<div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:2px 0;gap:8px">
<div id="view-tabs" style="display:flex;gap:4px">
  <button class="vtab on" data-view="all" onclick="setView('all')">Toutes</button>
  <button class="vtab" data-view="face" onclick="setView('face')">Vue face</button>
  <button class="vtab" data-view="plan" onclick="setView('plan')">Coupe A-A</button>
  <button class="vtab" data-view="plaques" onclick="setView('plaques')">Plaques PE</button>
  <button class="vtab" data-view="porte" onclick="setView('porte')">Porte</button>
</div>
<div id="zoom-bar" style="display:flex;align-items:center;gap:5px;flex-shrink:0">
  <button class="tbtn" style="padding:2px 7px;font-size:13px;line-height:1" onclick="setZoom(faceZoom/1.18)" title="Dézoomer (Ctrl+-)">−</button>
  <input type="range" id="zoom-slider" min="25" max="200" value="100" step="5"
    style="width:90px;cursor:pointer;accent-color:#185FA5"
    oninput="setZoom(this.value/100)">
  <button class="tbtn" style="padding:2px 7px;font-size:13px;line-height:1" onclick="setZoom(faceZoom*1.18)" title="Zoomer (Ctrl+=)">+</button>
  <span id="zoom-pct" style="font-size:10px;font-weight:600;color:#185FA5;min-width:34px;text-align:right">100%</span>
  <button class="tbtn" style="padding:2px 8px;font-size:10px" onclick="setZoom(1,true)" title="Réinitialiser zoom et position (Ctrl+0)">Ajuster</button>
</div>
</div>
<div id="main">
  <div id="lib">
    <button class="panel-toggle" onclick="toggleLib()" title="Replier/déplier bibliothèque">◀ Biblio</button>
  </div>
  <div class="resize-h" id="rh-lib" title="Redimensionner bibliothèque"></div>
  <div id="views-area">
    <canvas id="cv-face"></canvas>
    <canvas id="cv-plan" style="cursor:default"></canvas>
    <canvas id="cv-top" style="display:none"></canvas>
    <canvas id="cv-bot" style="display:none"></canvas>
    <canvas id="cv-door" style="display:none"></canvas>
  </div>
  <div class="resize-h" id="rh-wp" title="Redimensionner tableau filerie"></div>
  <div id="wp">
    <button class="panel-toggle" onclick="toggleWP()" title="Replier/déplier filerie">Filerie ▶</button>
    <div class="wp-hdr">
      <span class="wp-title">Filerie</span>
      <button class="wp-btn" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div id="wt-wrap"><table id="wt">
      <thead><tr><th>Rep.</th><th>Clr</th><th>Type</th><th>mm²</th><th>De</th><th>Vers</th><th>L mm</th></tr></thead>
      <tbody id="wt-body"></tbody>
    </table></div>
  </div>
</div>
<div id="info">Cliquer-glisser pour déplacer · Dbl-clic étiquette · Clic droit supprimer · Fil : cliquer point ⬤ départ puis arrivée · Échap annuler · Ctrl+C/V copier · Supr supprimer</div>
</div>

// Nomenclature / BOM
function exportBOM(){
  const counts={};
  [...PLACED,...DOOR_PLACED].forEach(p=>{
    const key=`${p.comp.name}||${p.comp.sub}||${p.comp.group}`;
    counts[key]=(counts[key]||{comp:p.comp,n:0});counts[key].n++;
  });
  const rows=[['Désignation','Référence','Groupe','Qté']];
  Object.values(counts).forEach(({comp,n})=>rows.push([comp.name,comp.sub,comp.group,n]));
  // Fils
  rows.push(['','','','']);rows.push(['--- Filerie ---','','','']);
  const byType={};
  WIRES.forEach(w=>{const k=`${w.wtype||'H07V-K'} ${w.section}mm²`;byType[k]=(byType[k]||0)+wireSplineLength(w);});
  Object.entries(byType).forEach(([k,l])=>rows.push([k,'','Câblage',`${(l/1000).toFixed(1)} m`]));
  const bom=['BOM / Nomenclature — CAO Armoire Électrique\n',
    '========================================\n',
    ...rows.map(r=>r.join('\t'))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([bom],{type:'text/plain;charset=utf-8'}));
  a.download=`nomenclature-${new Date().toISOString().slice(0,10)}.txt`;a.click();
}

// Input flottant au clic sur une cotation
// Reste ouvert jusqu'à : Entrée, bouton ✓, Échap, ou clic en dehors
function showCoteInput(screenX,screenY,val,min,max,onSubmit){
  const old=document.getElementById('_cote_inp');if(old)old.remove();
  const wrap=document.createElement('div');
  wrap.id='_cote_inp';
  // Positionner en s'assurant que la boîte reste visible à l'écran
  const lx=Math.min(screenX-50, window.innerWidth-160);
  const ly=Math.max(4, screenY-26);
  wrap.style.cssText=`position:fixed;left:${lx}px;top:${ly}px;z-index:9999;background:#fff;border:2.5px solid #1D9E75;border-radius:9px;box-shadow:0 6px 24px rgba(0,0,0,.28);padding:5px 8px;display:flex;align-items:center;gap:6px`;
  // Label de la valeur actuelle
  const lbl=document.createElement('span');
  lbl.style.cssText='font-size:9px;color:#888;white-space:nowrap';
  lbl.textContent=`${Math.round(val)} mm →`;
  // Champ de saisie
  const inp=document.createElement('input');
  inp.type='number';inp.value=Math.round(val);inp.min=min;inp.max=max;inp.step=1;
  inp.style.cssText='width:68px;font-size:14px;font-weight:700;border:none;outline:none;text-align:center;color:#0A5040;background:transparent';
  const unit=document.createElement('span');unit.textContent='mm';unit.style.cssText='font-size:10px;color:#888;margin-right:2px';
  // Bouton valider
  const btn=document.createElement('button');
  btn.textContent='✓ OK';
  btn.style.cssText='font-size:11px;font-weight:700;background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;white-space:nowrap';
  wrap.appendChild(lbl);wrap.appendChild(inp);wrap.appendChild(unit);wrap.appendChild(btn);
  document.body.appendChild(wrap);
  // Focus sans sélectionner — l'utilisateur voit la valeur entière
  inp.focus();inp.select();

  let closed=false;
  function submit(){
    if(closed)return;closed=true;
    const v=parseFloat(inp.value);
    wrap.remove();
    document.removeEventListener('mousedown',onOutside,true);
    if(!isNaN(v)&&v>=min&&v<=max){onSubmit(v);draw();}
  }
  function cancel(){
    if(closed)return;closed=true;
    wrap.remove();
    document.removeEventListener('mousedown',onOutside,true);
  }
  // Clic en dehors → ferme sans valider
  function onOutside(e){
    if(!wrap.contains(e.target))cancel();
  }
  // Attendre un tick avant d'armer le listener "dehors" (sinon le clic d'ouverture le déclenche)
  setTimeout(()=>document.addEventListener('mousedown',onOutside,true),50);

  btn.addEventListener('click',e=>{e.stopPropagation();submit();});
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();submit();}
    if(e.key==='Escape'){e.preventDefault();cancel();}
    e.stopPropagation();
  });
  // PAS de handler blur — l'input reste ouvert même si l'utilisateur clique sur les flèches ↑↓
}

// LAYOUT
// ═══════════════════════════════════════════════════════════════════════
function getLayout(){
  const model=MODELS[document.getElementById('sel-model').value];
  const nbApp=NAP(),nbBorn=NBN(),ghH=GH(),espR=ESP();
  const{w,h,m}=model;
  const intX=m+VGOUL_W,intW=w-2*m-2*VGOUL_W;
  const zones=[];let cy=m;
  // Rails appareillage (haut)
  for(let i=0;i<nbApp+1;i++){
    zones.push({type:'goulH',y:cy,h:ghH,idx:i,sub:'app',label:`GH${i+1}`});cy+=ghH;
    if(i<nbApp){
      cy+=espR;
      const lbl=`R${i+1}`,off=RAIL_OFFSETS[lbl]||0;
      zones.push({type:'rail',y:cy+off,h:RAIL_H,idx:i,sub:'app',depth:RAIL_D_APP,label:lbl,baseY:cy});
      cy+=RAIL_H+espR;
    }
  }
  // Rails borniers (bas) — la dernière GH app sert de transition, pas de GH dupliquée
  for(let i=0;i<nbBorn;i++){
    const ri=nbApp+1+i;
    cy+=espR;
    const lbl=`R${ri}`,off=RAIL_OFFSETS[lbl]||0;
    zones.push({type:'rail',y:cy+off,h:RAIL_H,idx:ri-1,sub:'born',depth:RAIL_D_BORN,label:lbl,baseY:cy});
    cy+=RAIL_H+espR;
    zones.push({type:'goulH',y:cy,h:ghH,idx:nbApp+1+i,sub:'born',label:`GH${nbApp+2+i}`});cy+=ghH;
  }
  if(cutLineY===null)cutLineY=h/2;
  return{model,nbApp,nbBorn,ghH,espR,intX,intW,zones,m,w,h};
}

// POINTS D'ACCROCHAGE
// ═══════════════════════════════════════════════════════════════════════
function getConnPts(p){
  if(!p?.comp)return[];
  const c=p.comp,cw=c.modW,ch=c.modH;
  if(c.type==='disj'||c.type==='diff'||c.type==='sect')
    return[{id:'top',wx:p.wx+cw/2,wy:p.wy},{id:'bot',wx:p.wx+cw/2,wy:p.wy+ch}];
  if(c.type==='repot'){
    // 1 entrée en haut (centre) + N sorties décalées en bas (éventail)
    const N=c.poles;
    const stagMM=Math.min(30,(N-1)*4); // décalage total max 30mm
    const step=N>1?stagMM/(N-1):0;
    const pts=[{id:'in',wx:p.wx+cw/2,wy:p.wy}]; // entrée alimentation
    for(let i=0;i<N;i++){
      pts.push({id:`b${i}`,wx:p.wx+(i+.5)*cw/N,wy:p.wy+ch+i*step});
    }
    return pts;
  }
  if(c.type==='bornier')
    return[{id:'left',wx:p.wx,wy:p.wy+ch/2},{id:'right',wx:p.wx+cw,wy:p.wy+ch/2}];
  if(c.type==='petoupe')
    return[{id:'inner',wx:p.wx+cw/2,wy:p.wy+ch*(p.band==='top'?1:0)}];
  if(c.type==='voyant'){
    // Si le voyant a une position face (panneau porte à droite), utiliser celle-là
    if(p._faceWX!==undefined)return[{id:'face',wx:p._faceWX,wy:p._faceWY}];
    return[{id:'bot',wx:p.wx+cw/2,wy:p.wy+ch}];
  }
  return[];
}

function nearestConnPt(wx,wy,excludeP,collectionOverride){
  const th=18;let best=null,bd=Infinity;
  const coll=collectionOverride||[...PLACED,...(doorVisible?DOOR_PLACED:[])];
  coll.forEach(p=>{
    if(p===excludeP)return;
    getConnPts(p).forEach(pt=>{
      const d=Math.hypot(wx-pt.wx,wy-pt.wy);
      if(d<th&&d<bd){bd=d;best={placed:p,pt};}
    });
  });
  return best;
}

// ═══════════════════════════════════════════════════════════════════════
// SNAP & PLACEMENT
// ═══════════════════════════════════════════════════════════════════════
function findFreeX(wx,comp,rail,layout){
  const{intX,intW}=layout,grid=comp.type==='bornier'?1:18;
  const peers=PLACED.filter(p=>p.type==='comp'&&p.railRef?.label===rail.label);
  const fits=x=>x>=intX&&x+comp.modW<=intX+intW&&!peers.some(p=>x<p.wx+p.comp.modW&&x+comp.modW>p.wx);
  let s=intX+Math.round((wx-intX)/grid)*grid;
  s=Math.max(intX,Math.min(s,intX+intW-comp.modW));
  for(let x=s;x<=intX+intW-comp.modW;x+=grid)if(fits(x))return x;
  for(let x=s-grid;x>=intX;x-=grid)if(fits(x))return x;
  return null;
}

function applySnap(wx,wy,comp,layout){
  const{zones,intX,intW,m,h}=layout;
  // Presse-étoupe : bandes haute/basse
  if(comp.type==='petoupe'){
    const grid=5,band=wy<h/2?'top':'bottom';
    const peWy=band==='top'?m/2-comp.modH/2:h-m/2-comp.modH/2;
    const peers=PLACED.filter(p=>p.type==='comp'&&p.comp?.type==='petoupe'&&p.band===band);
    const fits=x=>!peers.some(p=>x<p.wx+p.comp.modW+2&&x+comp.modW+2>p.wx);
    let fx=intX+Math.round((wx-intX)/grid)*grid;
    fx=Math.max(intX,Math.min(fx,intX+intW-comp.modW));
    if(!fits(fx)){for(let d=grid;d<intW;d+=grid){if(fits(fx+d)){fx+=d;break;}if(fits(fx-d)){fx-=d;break;}}}
    return{wx:Math.max(intX,Math.min(fx,intX+intW-comp.modW)),wy:peWy,band,onRail:false};
  }
  // Composant standard
  const isBorn=comp.type==='bornier',isApp=['disj','diff','sect'].includes(comp.type);
  const needSub=isBorn?'born':isApp?'app':null;
  const th=28;
  const rail=zones.find(z=>z.type==='rail'&&(needSub===null||z.sub===needSub)&&Math.abs(wy-(z.y+(RAIL_H-comp.modH)/2))<th);
  if(!rail)return{wx:Math.max(intX,Math.min(wx,intX+intW-comp.modW)),wy,onRail:false};
  const fx=findFreeX(wx,comp,rail,layout);
  const fy=rail.y+(RAIL_H-comp.modH)/2;
  if(fx===null)return{wx:Math.max(intX,wx),wy:fy,onRail:true,noSpace:true,rail};
  return{wx:fx,wy:fy,onRail:true,rail};
}

function autoLabel(comp){
  if(comp.type==='bornier'){return`B${PLACED.filter(p=>p.comp?.type==='bornier').length+1}`;}
  if(comp.type==='petoupe'){return`PE${PLACED.filter(p=>p.comp?.type==='petoupe').length+1}`;}
  if(comp.type==='voyant'){return`V${DOOR_PLACED.filter(p=>p.comp?.type==='voyant').length+1}`;}
  // Disjoncteurs/sectionneurs/différentiels : numérotation avec préfixe type
  if(comp.type==='disj'){const n=PLACED.filter(p=>p.comp?.type==='disj').length+1;return`Q${n}`;}
  if(comp.type==='diff'){const n=PLACED.filter(p=>p.comp?.type==='diff').length+1;return`ID${n}`;}
  if(comp.type==='sect'){const n=PLACED.filter(p=>p.comp?.type==='sect').length+1;return`QS${n}`;}
  if(comp.type==='repot'){const n=PLACED.filter(p=>p.comp?.type==='repot').length+1;return`RP${n}`;}
  if(comp.type==='repartiteur'){const n=PLACED.filter(p=>p.comp?.type==='repartiteur').length+1;return`REP${n}`;}
  return comp.name;
}

// ═══════════════════════════════════════════════════════════════════════
// ROUTAGE FIL — 3 segments stricts à l'équerre
// Départ → montée/descente vers goulotte GH → horizontal → descente/montée arrivée
// Jamais de diagonale, jamais de traversée de composant
// ═══════════════════════════════════════════════════════════════════════
function routeWireStrict(startPt,endPt,startComp,endComp,layout,startPtId,endPtId){
  const{zones}=layout;
  const[x1,y1]=startPt,[x2,y2]=endPt;
  const goulottes=zones.filter(z=>z.type==='goulH');
  if(!goulottes.length)return[startPt,endPt];

  // Sélection de la goulotte selon la direction de sortie du composant :
  // 'bot' → fil descend → goulotte en dessous
  // 'top' → fil monte → goulotte au dessus
  // bornier (left/right) → goulotte la plus proche
  let pool;
  if(startPtId==='bot'){
    const below=goulottes.filter(z=>z.y+z.h/2>y1);
    pool=below.length?below:goulottes;
  } else if(startPtId==='top'){
    const above=goulottes.filter(z=>z.y+z.h/2<y1);
    pool=above.length?above:goulottes;
  } else {
    // Bornier ou inconnu : goulotte entre les deux points
    const yMin=Math.min(y1,y2),yMax=Math.max(y1,y2);
    const between=goulottes.filter(z=>{const gY=z.y+z.h/2;return gY>=yMin-5&&gY<=yMax+5;});
    pool=between.length?between:goulottes;
  }

  // Goulotte la plus proche du point de départ dans le pool
  const goulotte=pool.reduce((a,b)=>Math.abs(a.y+a.h/2-y1)<Math.abs(b.y+b.h/2-y1)?a:b);
  const gY=goulotte.y+goulotte.h/2;

  // 4 points de base puis waypoints tous les 20mm
  const basePts=[[x1,y1],[x1,gY],[x2,gY],[x2,y2]];
  return addWaypoints(basePts,20);
}

// Ajoute des waypoints intermédiaires tous les spacingMM mm sur chaque segment
function addWaypoints(pts,spacingMM=100){
  if(pts.length<2)return pts;
  const res=[pts[0]];
  for(let i=1;i<pts.length;i++){
    const[x1,y1]=pts[i-1],[x2,y2]=pts[i];
    const d=Math.hypot(x2-x1,y2-y1);
    if(d>spacingMM*1.5){
      const n=Math.round(d/spacingMM);
      for(let j=1;j<n;j++)res.push([x1+(x2-x1)*j/n,y1+(y2-y1)*j/n]);
    }
    res.push([x2,y2]);
  }
  return res;
}

// Distance d'un point à un segment (coords canvas)
function ptSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
  if(len2<0.001)return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
// Paramètre t de la projection sur segment
function ptSegT(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
  if(len2<0.001)return 0;
  return Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
}

function wireLength(pts){
  if(!pts||pts.length<2)return 0;
  let l=0;for(let i=1;i<pts.length;i++)l+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);
  return Math.round(l);
}

// ═══════════════════════════════════════════════════════════════════════
// HELPERS DESSIN
// ═══════════════════════════════════════════════════════════════════════
function rr(ctx,x,y,w,h,r){
  r=Math.max(0,Math.min(r,w/2,h/2));ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// Spline Catmull-Rom : courbe lisse passant par tous les waypoints
// Le premier et dernier segment restent tangents à la direction initiale/finale
function drawSpline(ctx,wpts,minR,sc){
  if(!wpts||wpts.length<2)return;
  const pts=wpts.map(p=>W2F(p[0],p[1]));
  if(pts.length===2){
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);ctx.lineTo(pts[1][0],pts[1][1]);return;
  }
  // Tension Catmull-Rom fixe 0.42 — courbe douce standard, sans angles vifs
  const tension=0.42;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(i-1,0)];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[Math.min(i+2,pts.length-1)];
    // Points de contrôle bezier cubique issus de Catmull-Rom
    const cp1x=p1[0]+(p2[0]-p0[0])*tension;
    const cp1y=p1[1]+(p2[1]-p0[1])*tension;
    const cp2x=p2[0]-(p3[0]-p1[0])*tension;
    const cp2y=p2[1]-(p3[1]-p1[1])*tension;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2[0],p2[1]);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// COTES DE POSITION — affichées au clic sur un élément
// ═══════════════════════════════════════════════════════════════════════
function drawPosCotes(ctx,sx,sy,sw,p,layout,sc){
  const{intX,intW,m,h}=layout;
  const c=p.comp,cw=c.modW,ch=c.modH;
  const C='#1060C0';
  ctx.strokeStyle=C;ctx.fillStyle=C;ctx.lineWidth=.6;
  const fs=Math.max(7,Math.round(sc*14));
  ctx.font=`600 ${fs}px system-ui`;

  // ── Cote X : distance depuis bord gauche intérieur
  const dx=Math.round(p.wx-intX);
  if(dx>=0){
    const y0=sy(p.wy)-18;
    const x1=sx(intX),x2=sx(p.wx);
    if(Math.abs(x2-x1)>8){
      ctx.setLineDash([4,2]);
      ctx.beginPath();ctx.moveTo(x1,sy(p.wy));ctx.lineTo(x1,y0+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x2,sy(p.wy));ctx.lineTo(x2,y0+4);ctx.stroke();
      ctx.setLineDash([]);ctx.lineWidth=.7;
      ctx.beginPath();ctx.moveTo(x1,y0);ctx.lineTo(x2,y0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x1,y0-3);ctx.lineTo(x1,y0+3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x2,y0-3);ctx.lineTo(x2,y0+3);ctx.stroke();
      ctx.textAlign='center';ctx.fillText(`X:${dx}`,( x1+x2)/2,y0-4);
    }
  }

  // ── Cote largeur composant
  const compW=Math.round(cw);
  {
    const y1=sy(p.wy)-8;
    const xa=sx(p.wx),xb=sx(p.wx+cw);
    ctx.setLineDash([2,2]);ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(xa,sy(p.wy));ctx.lineTo(xa,y1+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(xb,sy(p.wy));ctx.lineTo(xb,y1+2);ctx.stroke();
    ctx.setLineDash([]);ctx.lineWidth=.6;
    ctx.beginPath();ctx.moveTo(xa,y1);ctx.lineTo(xb,y1);ctx.stroke();
    ctx.textAlign='center';ctx.fillStyle='rgba(16,96,192,.7)';
    ctx.fillText(`${compW}mm`,( xa+xb)/2,y1-3);ctx.fillStyle=C;
  }

  // ── Cote Y : distance depuis bord supérieur intérieur (y=m)
  if(p.type==='comp'&&c.type!=='petoupe'){
    const refY=p.railRef?p.railRef.y:p.wy;
    const dy=Math.round(refY-m);
    const x0=sx(intX)-22;
    const ya=sy(m),yb=sy(refY);
    if(Math.abs(yb-ya)>8){
      ctx.setLineDash([4,2]);ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(sx(intX),ya);ctx.lineTo(x0+3,ya);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx(intX),yb);ctx.lineTo(x0+3,yb);ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(x0,ya);ctx.lineTo(x0,yb);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x0-3,ya);ctx.lineTo(x0+3,ya);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x0-3,yb);ctx.lineTo(x0+3,yb);ctx.stroke();
      ctx.save();ctx.translate(x0-fs-1,(ya+yb)/2);ctx.rotate(-Math.PI/2);
      ctx.textAlign='center';ctx.fillText(`Y:${dy}`,0,0);ctx.restore();
    }
  }

  // ── Pour PE : indiquer la bande et distance X
  if(c.type==='petoupe'){
    const bLbl=p.band==='top'?'Bande haute':'Bande basse';
    const[qx,qy]=W2F(p.wx+cw/2,p.wy+ch/2);
    ctx.textAlign='center';ctx.fillStyle='rgba(16,96,192,.85)';
    ctx.font=`500 ${Math.max(7,fs-1)}px system-ui`;
    ctx.fillText(bLbl,qx,qy+ch*sc*.5+10);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// DESSIN PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════
function draw(){
  const layout=getLayout();
  const{intX,intW,zones,m,w,h}=layout;
  const sc=getSc()*faceZoom;  // échelle avec zoom appliqué
  const DOOR_PANEL_W=doorVisible&&DOOR_PLACED.length?80:0;
  const panExtra=Math.max(0,Math.ceil(Math.abs(facePanX)),Math.ceil(Math.abs(facePanY)));
  const FW=Math.round(w*sc)+130+(DOOR_PANEL_W?DOOR_PANEL_W+24:0)+panExtra*2,FH=Math.round(h*sc)+100+panExtra*2;
  const cv=document.getElementById('cv-face');
  cv.width=FW;cv.height=FH;cv.style.width=FW+'px';cv.style.height=FH+'px';
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,FW,FH);
  function sx(v){return 58+v*sc}function sy(v){return 34+v*sc}function sw(v){return v*sc}

  // ── Fond
  const fg=ctx.createLinearGradient(sx(0),sy(0),sx(w),sy(h));
  fg.addColorStop(0,'#E8F2FC');fg.addColorStop(1,'#D2E6F6');
  ctx.fillStyle=fg;ctx.strokeStyle='#5B9FD4';ctx.lineWidth=1.5;
  rr(ctx,sx(0),sy(0),sw(w),sw(h),6);ctx.fill();ctx.stroke();

  // ── Bandes tôle haut/bas (presse-étoupes)
  [0,h-m].forEach((bandY,bi)=>{
    const grad=ctx.createLinearGradient(sx(0),sy(bandY),sx(0),sy(bandY+m));
    grad.addColorStop(0,bi===0?'#B8C8D8':'#A8BCC8');
    grad.addColorStop(1,bi===0?'#A8BCC8':'#98ACBC');
    ctx.fillStyle=grad;
    ctx.fillRect(sx(0),sy(bandY),sw(w),sw(m));
    ctx.strokeStyle='#889AAA';ctx.lineWidth=.5;
    ctx.strokeRect(sx(0),sy(bandY),sw(w),sw(m));
    // Label GV bande
    const fs=Math.max(7,Math.round(sc*16));
    ctx.font=`500 ${fs}px system-ui`;ctx.fillStyle='#7090B0';ctx.textAlign='left';
    ctx.fillText(bi===0?'GV1 — GV2 (haut)':'GV1 — GV2 (bas)',sx(m+VGOUL_W+5),sy(bandY+m/2)+fs*.35);
  });

  // ── Goulottes verticales GV1 (gauche) et GV2 (droite)
  drawVertGoul(ctx,sx(m),sy(m),sw(VGOUL_W),sw(h-2*m),'GV1');
  drawVertGoul(ctx,sx(w-m-VGOUL_W),sy(m),sw(VGOUL_W),sw(h-2*m),'GV2');

  // ── Zones horizontales
  zones.forEach(z=>{
    if(z.type==='goulH'){
      ctx.fillStyle='#FAECE7';ctx.strokeStyle='#D85A30';ctx.lineWidth=.7;
      rr(ctx,sx(intX),sy(z.y),sw(intW),sw(z.h),2);ctx.fill();ctx.stroke();
      if(FLAGS.capots){
        ctx.fillStyle='rgba(83,74,183,.07)';ctx.strokeStyle='#534AB7';ctx.lineWidth=.35;
        rr(ctx,sx(intX+3),sy(z.y+3),sw(intW-6),sw(z.h-6),1);ctx.fill();ctx.stroke();
      }
      if(sw(z.h)>7){
        const fs=Math.max(6,Math.round(sw(z.h)*.46));
        ctx.font=`500 ${fs}px system-ui`;ctx.fillStyle='#A04010';ctx.textAlign='left';
        ctx.fillText(z.label,sx(intX+5),sy(z.y+z.h/2)+fs*.35);
      }
    } else if(z.type==='rail'){
      drawRailDIN(ctx,sx,sy,sw,z,intX,intW,sc);
    }
  });

  // ── Composants fond
  PLACED.forEach(p=>{if(p.type==='comp')drawComp(ctx,p,sc);});

  // ── Fils (dessinés APRÈS les composants pour toujours être visibles)
  ctx.save();
  WIRES.forEach(wire=>drawWire(ctx,wire,sc,layout));
  ctx.restore();

  // ── Preview fil en cours
  if(wm.active&&wm.startP){
    const sp=getConnPts(wm.startP).find(pt=>pt.id===wm.startPtId);
    if(sp){
      const sec=SEC(),minR=BEND_R[sec]||20;
      const prev=routeWireStrict([sp.wx,sp.wy],[wm.prevX,wm.prevY],wm.startP,null,layout);
      ctx.strokeStyle='rgba(192,112,0,.55)';
      ctx.lineWidth=Math.max(1.5,wireR(sec)*sc*2);ctx.lineCap='round';ctx.lineJoin='round';
      drawSpline(ctx,prev,minR,sc);ctx.stroke();ctx.lineCap='butt';
      // Point de départ accentué
      const[spx,spy]=W2F(sp.wx,sp.wy);
      ctx.fillStyle='#D06000';ctx.beginPath();ctx.arc(spx,spy,5,0,Math.PI*2);ctx.fill();
    }
  }

  // ── Points d'accrochage (hover ou mode fil)
  const connTargets=wm.active?PLACED:hoveredComp?[hoveredComp]:[];
  connTargets.forEach(p=>{
    if(p.type!=='comp')return;
    getConnPts(p).forEach(pt=>{
      const[px,py]=W2F(pt.wx,pt.wy);
      ctx.fillStyle='rgba(255,140,0,.88)';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.stroke();
    });
  });

  // ── Sélection + cotes de position
  if(selectedComp?.type==='comp'){
    const c=selectedComp.comp;const[spx,spy]=W2F(selectedComp.wx,selectedComp.wy);
    ctx.strokeStyle='#185FA5';ctx.lineWidth=2;ctx.setLineDash([3,2]);
    rr(ctx,spx-3,spy-3,c.modW*sc+6,c.modH*sc+6,4);ctx.stroke();ctx.setLineDash([]);
    // Cotes de position
    drawPosCotes(ctx,sx,sy,sw,selectedComp,layout,sc);
  }

  // ── Trait de coupe A-A
  drawCutLine(ctx,sx,sy,sw,w,h,sc,layout);

  if(FLAGS.cotes)drawCotes(ctx,sx,sy,sw,w,h,m,intX,intW,zones,sc,layout.espR);

  // ── Ghost
  if(libGhost){
    const c=libGhost.comp;
    const[wx0,wy0]=F2W(libGhost.x,libGhost.y);
    const{wx,wy,onRail,noSpace}=applySnap(wx0-c.modW/2,wy0-c.modH/2,c,layout);
    const[gx,gy]=W2F(wx,wy);
    ctx.fillStyle=noSpace?'rgba(200,0,0,.1)':onRail?'rgba(24,95,165,.13)':'rgba(80,150,220,.09)';
    ctx.strokeStyle=noSpace?'#C00':onRail?'#185FA5':'#5B9FD4';
    ctx.lineWidth=1;ctx.setLineDash([3,2]);
    rr(ctx,gx,gy,c.modW*sc,c.modH*sc,3);ctx.fill();ctx.stroke();ctx.setLineDash([]);
  }

  drawPlanView(layout);
  drawPlateView('top',layout);
  drawPlateView('bot',layout);
  if(doorVisible)drawDoorView(layout);

  // ── Panneau voyants porte (à droite de la vue face)
  if(doorVisible&&DOOR_PLACED.length){
    const dpX=sx(w)+36,dpW=DOOR_PANEL_W;
    ctx.fillStyle='#C8D8E8';ctx.strokeStyle='#6080A0';ctx.lineWidth=1;
    rr(ctx,dpX,sy(0),dpW,sw(h),6);ctx.fill();ctx.stroke();
    ctx.font='bold 8px system-ui';ctx.fillStyle='#4060A0';ctx.textAlign='center';
    ctx.fillText('PORTE',dpX+dpW/2,sy(0)-6);
    // Trait pointillé joint
    ctx.strokeStyle='rgba(80,80,200,.35)';ctx.lineWidth=.8;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(sx(w)+2,sy(h*.5));ctx.lineTo(dpX,sy(h*.5));ctx.stroke();
    ctx.setLineDash([]);
    ctx.font='7px system-ui';ctx.fillStyle='rgba(80,80,200,.6)';
    ctx.fillText(`joint ${DOOR_GAP()}mm`,sx(w)+18,sy(h*.5)-5);
    // Dessiner voyants avec point de connexion
    DOOR_PLACED.forEach((p,pi)=>{
      const c=p.comp;
      const vcx=dpX+dpW/2;
      const vcy=sy(m+((h-2*m)/(DOOR_PLACED.length+1))*(pi+1));
      const r=Math.max(8,Math.min(14,dpW*.18));
      const rg=ctx.createRadialGradient(vcx-r*.25,vcy-r*.25,r*.05,vcx,vcy,r);
      rg.addColorStop(0,c.color+'FF');rg.addColorStop(1,c.color+'88');
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(vcx,vcy,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.arc(vcx,vcy,r,0,Math.PI*2);ctx.stroke();
      // Reflet
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(vcx-r*.28,vcy-r*.28,r*.32,0,Math.PI*2);ctx.fill();
      // Label
      const fs=Math.max(6,Math.round(r*.42));
      ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='#fff';ctx.textAlign='center';
      ctx.fillText(p.label||'V?',vcx,vcy+fs*.35);
      // Point de connexion (gauche du panneau)
      const connX=dpX-2;
      ctx.fillStyle='rgba(255,140,0,.8)';ctx.strokeStyle='#fff';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(connX,vcy,4,0,Math.PI*2);ctx.fill();ctx.stroke();
      // Stocker la position monde de ce voyant pour le câblage
      p._faceWX=(connX-58)/sc;p._faceWY=(vcy-34)/sc;
    });
  }
}

// ═══════════════════════════════════════════════════════════════════════
// RAIL DIN — profil oméga métallique
// ═══════════════════════════════════════════════════════════════════════
function drawRailDIN(ctx,sx,sy,sw,z,intX,intW,sc){
  const rx=sx(intX),ry=sy(z.y),rw=sw(intW),rh=sw(z.h);
  const mg=ctx.createLinearGradient(rx,ry,rx,ry+rh);
  mg.addColorStop(0,'#AAAAAA');mg.addColorStop(.1,'#D2D2D2');mg.addColorStop(.3,'#EEEEEE');
  mg.addColorStop(.5,'#FAFAFA');mg.addColorStop(.7,'#E5E5E5');mg.addColorStop(.9,'#C5C5C5');mg.addColorStop(1,'#A5A5A5');
  ctx.fillStyle=mg;rr(ctx,rx,ry,rw,rh,2);ctx.fill();
  const fh=Math.max(2,rh*.16);
  const tg=ctx.createLinearGradient(rx,ry,rx,ry+fh);tg.addColorStop(0,'#888');tg.addColorStop(1,'#CCC');
  ctx.fillStyle=tg;ctx.fillRect(rx,ry,rw,fh);
  const bg=ctx.createLinearGradient(rx,ry+rh-fh,rx,ry+rh);bg.addColorStop(0,'#C0C0C0');bg.addColorStop(1,'#888');
  ctx.fillStyle=bg;ctx.fillRect(rx,ry+rh-fh,rw,fh);
  ctx.fillStyle='rgba(0,0,0,.05)';ctx.fillRect(rx,ry+rh*.36,rw,rh*.28);
  const hW=Math.max(2.5,sw(7)),hH=Math.max(3.5,sw(11)),hCY=ry+rh*.5;
  for(let hx=sx(intX+12.5);hx<rx+rw-hW;hx+=sw(25)){
    ctx.fillStyle='#767676';ctx.beginPath();ctx.ellipse(hx,hCY,hW/2,hH/2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#545454';ctx.beginPath();ctx.ellipse(hx,hCY,hW*.28,hH*.28,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.ellipse(hx,hCY-hH*.13,hW*.3,hH*.19,0,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='#909090';ctx.lineWidth=.7;rr(ctx,rx,ry,rw,rh,2);ctx.stroke();
  if(rh>7){
    const fs=Math.max(6,Math.round(rh*.33));
    ctx.font=`500 ${fs}px system-ui`;ctx.fillStyle='#686868';ctx.textAlign='left';
    ctx.fillText(z.label,rx+5,ry+rh*.5+fs*.35);
    ctx.textAlign='right';ctx.fillStyle='#A8A8A8';ctx.font=`${fs*.8}px system-ui`;
    ctx.fillText(z.sub==='born'?'Born.':'App.',rx+rw-5,ry+rh*.5+fs*.35);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// GOULOTTE VERTICALE
// ═══════════════════════════════════════════════════════════════════════
function drawVertGoul(ctx,x,y,w,h,label){
  ctx.fillStyle='#FAECE7';ctx.strokeStyle='#D85A30';ctx.lineWidth=.7;
  rr(ctx,x,y,w,h,2);ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(216,90,48,.25)';ctx.lineWidth=.35;
  for(let iy=y+12;iy<y+h-6;iy+=12){ctx.beginPath();ctx.moveTo(x+3,iy);ctx.lineTo(x+w-3,iy);ctx.stroke();}
  if(h>40){
    const fs=Math.max(7,Math.round(w*.22));
    ctx.save();ctx.translate(x+w/2,y+h/2);ctx.rotate(-Math.PI/2);
    ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='#C05020';ctx.textAlign='center';
    ctx.fillText(label,0,fs*.35);ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// TRAIT DE COUPE A-A (étendu -CUT_EXT … h+CUT_EXT, avec œil)
// ═══════════════════════════════════════════════════════════════════════
function drawCutLine(ctx,sx,sy,sw,w,h,sc,layout){
  const clamp=Math.max(-CUT_EXT,Math.min(cutLineY||h/2,h+CUT_EXT));
  const cy=34+clamp*sc;
  const x0=sx(0)-18,x1=sx(w)+18;
  ctx.save();
  // Ligne pointillée ISO
  ctx.strokeStyle='#C85800';ctx.lineWidth=1.2;ctx.setLineDash([10,4,2,4]);
  ctx.beginPath();ctx.moveTo(x0,cy);ctx.lineTo(x1,cy);ctx.stroke();ctx.setLineDash([]);
  // Flèches A — A
  function arrow(ax,ay,dir){
    ctx.fillStyle='#C85800';
    ctx.beginPath();
    if(dir>0){ctx.moveTo(ax+8,ay);ctx.lineTo(ax,ay-4);ctx.lineTo(ax,ay+4);}
    else{ctx.moveTo(ax-8,ay);ctx.lineTo(ax,ay-4);ctx.lineTo(ax,ay+4);}
    ctx.closePath();ctx.fill();
    ctx.font='bold 9px system-ui';ctx.fillStyle='#C85800';
    ctx.textAlign=dir>0?'left':'right';
    ctx.fillText('A',ax+(dir>0?11:-11),ay+3);
  }
  arrow(x0,cy,-1);arrow(x1,cy,1);
  // Œil gauche (avec indicateur direction)
  drawEye(ctx,x0-28,cy,cutDir<0);
  // Œil droit
  drawEye(ctx,x1+28,cy,cutDir>0);
  // Label hauteur (+Xmm hors fond haut / Xmm intérieur / -Xmm hors fond bas)
  const cY2=cutLineY||layout.h/2;
  let lbl;
  if(cY2<0)lbl=`+${Math.abs(Math.round(cY2))} mm`;
  else if(cY2>layout.h)lbl=`-${Math.round(cY2-layout.h)} mm`;
  else lbl=`${Math.round(layout.h-cY2)} mm`;
  const midX=(x0+x1)/2;
  ctx.fillStyle='rgba(200,88,0,.88)';rr(ctx,midX-28,cy-9,56,14,5);ctx.fill();
  ctx.font='bold 8.5px system-ui';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText(lbl,midX,cy+1);
  ctx.restore();
}

function drawEye(ctx,cx,cy,active){
  ctx.save();
  ctx.strokeStyle='#C85800';ctx.fillStyle=active?'#C85800':'rgba(200,88,0,.3)';ctx.lineWidth=1;
  // Contour œil
  ctx.beginPath();ctx.moveTo(cx-9,cy);
  ctx.bezierCurveTo(cx-9,cy-5.5,cx+9,cy-5.5,cx+9,cy);
  ctx.bezierCurveTo(cx+9,cy+5.5,cx-9,cy+5.5,cx-9,cy);
  ctx.closePath();
  ctx.fillStyle=active?'rgba(200,88,0,.2)':'rgba(200,88,0,.08)';ctx.fill();ctx.stroke();
  // Pupille
  ctx.fillStyle='#C85800';ctx.beginPath();ctx.arc(cx,cy,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// VUE PLAN (COUPE A-A) — section horizontale
// ═══════════════════════════════════════════════════════════════════════
function drawPlanView(layout){
  planViewMeta=null;PLAN_COTE_HITS.length=0; // reset
  const{m,w,h,intX,intW,zones}=layout;
  const cutY=Math.max(-CUT_EXT,Math.min(cutLineY||h/2,h+CUT_EXT));
  const isAbove=cutY<0,isBelow=cutY>h;
  const thick=isAbove||isBelow?TOLE_EP:panelThick(cutY,h);
  const scX=getSc(),scZ=Math.min(130/Math.max(thick,.1),2.5);
  const PW=Math.round(w*scX)+90,PH=Math.round(Math.max(thick,4)*scZ)+66;
  const cv=document.getElementById('cv-plan');
  cv.width=PW;cv.height=PH;cv.style.width=PW+'px';cv.style.height=PH+'px';
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,PW,PH);
  const OX=46,OZ=18;
  const flip=cutDir<0;
  function px(x){return OX+(flip?(w-x):x)*scX}
  function pz(z){return OZ+(flip?(thick-z):z)*scZ}
  function pw(v){return v*scX}function pd(v){return v*scZ}

  // ── Matière
  if(isAbove||isBelow){
    // Tôle S3D 1.5mm — coupe hors fond
    const tg=ctx.createLinearGradient(OX,OZ,OX,OZ+pd(TOLE_EP));
    tg.addColorStop(0,'#9090A0');tg.addColorStop(1,'#707080');
    ctx.fillStyle=tg;ctx.fillRect(OX,OZ,pw(w),pd(TOLE_EP));
    ctx.strokeStyle='#505060';ctx.lineWidth=.7;ctx.strokeRect(OX,OZ,pw(w),pd(TOLE_EP));
    // Perçages PE
    const band=isAbove?'top':'bottom';
    PLACED.filter(p=>p.comp?.type==='petoupe'&&p.band===band).forEach(p=>{
      const cx=px(p.wx+p.comp.modW/2);
      const pr=Math.max(1.5,pw(p.comp.modW/2));
      ctx.fillStyle='#333';ctx.beginPath();ctx.arc(cx,pz(TOLE_EP/2),pr,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#888';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(cx,pz(TOLE_EP/2),pr,0,Math.PI*2);ctx.stroke();
      const fs=Math.max(6,Math.round(pw(p.comp.modW)*.3));
      ctx.font=`${fs}px system-ui`;ctx.fillStyle='#EEE';ctx.textAlign='center';
      ctx.fillText(p.label||'PE?',cx,OZ+pd(TOLE_EP)+10);
    });
  } else {
    // ABS matière fond
    const mat=ctx.createLinearGradient(OX,OZ,OX,OZ+pd(thick));
    mat.addColorStop(0,'#C0C8D5');mat.addColorStop(1,'#AEB8C5');
    ctx.fillStyle=mat;ctx.fillRect(OX,OZ,pw(w),pd(thick));
    ctx.strokeStyle='#4E6070';ctx.lineWidth=1;ctx.strokeRect(OX,OZ,pw(w),pd(thick));

    // Goulottes verticales GV1, GV2
    function gvSection(x1,gw){
      ctx.fillStyle='#FAECE7';ctx.strokeStyle='#D85A30';ctx.lineWidth=.7;
      ctx.fillRect(px(x1),OZ,pw(gw)*(flip?-1:1),pd(thick));
      ctx.strokeRect(Math.min(px(x1),px(x1)+pw(gw)*(flip?-1:1)),OZ,pw(gw),pd(thick));
    }
    gvSection(m,VGOUL_W);gvSection(w-m-VGOUL_W,VGOUL_W);

    // Zone à cutY — gorges variables et épaulement rail
    const planViewHandles=[];
    const zone=zones.find(z=>cutY>=z.y&&cutY<z.y+z.h);
    if(zone?.type==='goulH'){
      const goulD=getZD(zone);
      const gX=px(intX),gW=pw(intW)*(flip?-1:1),gD=pd(goulD);
      ctx.fillStyle='#FAECE7';ctx.strokeStyle='#D85A30';ctx.lineWidth=.7;
      ctx.fillRect(Math.min(gX,gX+gW),OZ,Math.abs(gW),gD);
      ctx.strokeRect(Math.min(gX,gX+gW),OZ,Math.abs(gW),gD);
      ctx.fillStyle='rgba(216,90,48,.45)';
      ctx.fillRect(Math.min(gX,gX+gW),OZ,3,gD);
      ctx.fillRect(Math.max(gX,gX+gW)-3,OZ,3,gD);
      ctx.fillRect(Math.min(gX,gX+gW),OZ+gD-3,Math.abs(gW),3);
      // Drag handle gorge
      const hY=OZ+gD,midX=(Math.min(gX,gX+gW)+Math.max(gX,gX+gW))/2;
      const isDrg=planDepthDrag?.zoneLabel===zone.label;
      ctx.strokeStyle=isDrg?'#C85800':'rgba(200,88,0,.65)';ctx.lineWidth=isDrg?2:1.2;ctx.setLineDash([5,3]);
      ctx.beginPath();ctx.moveTo(Math.min(gX,gX+gW),hY);ctx.lineTo(Math.max(gX,gX+gW),hY);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=isDrg?'#C85800':'rgba(200,88,0,.8)';ctx.beginPath();ctx.arc(midX,hY,4,0,Math.PI*2);ctx.fill();
      // Cote gorge
      const cX=Math.max(gX,gX+gW)+18;
      ctx.strokeStyle='#1D9E75';ctx.fillStyle='#C85800';ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(cX,OZ);ctx.lineTo(cX,hY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cX-3,OZ);ctx.lineTo(cX+3,OZ);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cX-3,hY);ctx.lineTo(cX+3,hY);ctx.stroke();
      ctx.save();ctx.translate(cX+11,(OZ+hY)/2);ctx.rotate(Math.PI/2);
      ctx.font='bold 7px system-ui';ctx.textAlign='center';ctx.fillText(`gorge ${Math.round(goulD)}mm`,0,0);ctx.restore();
      // Cote gorge cliquable
      PLAN_COTE_HITS.push({x:cX+11,y:(OZ+hY)/2,r:20,val:goulD,min:10,max:thick-5,
        onSubmit:v=>{ZONE_DEPTHS[zone.label]=Math.round(v);draw();}});
      planViewHandles.push({zoneLabel:zone.label,canvasY:hY,minD:10,maxD:thick-5,scZ,OZ});
    } else if(zone?.type==='rail'){
      const railD=getZD(zone);
      const RAIL_DIN_H=10; // épaisseur profil DIN 35 mm (fixe)
      const defaultRailFZ=Math.max(RAIL_DIN_H+4,Math.round(railD*0.25));
      const railFZ=Math.max(2,Math.min(
        RAIL_FRONT_Z[zone.label]!==undefined?RAIL_FRONT_Z[zone.label]:defaultRailFZ,
        railD-RAIL_DIN_H-2));
      const rX=px(intX),rW=pw(intW)*(flip?-1:1);
      const sectionEndY=OZ+pd(railD);
      const rFaceY=OZ+pd(railFZ);    // face avant rail DIN (canvas Y)
      const rH=pd(RAIL_DIN_H);       // hauteur rail en pixels
      const midX2=(Math.min(rX,rX+rW)+Math.max(rX,rX+rW))/2;

      // Section fond gris-bleu
      ctx.fillStyle='#D8E4EE';ctx.strokeStyle='#7090A8';ctx.lineWidth=.5;
      ctx.fillRect(Math.min(rX,rX+rW),OZ,Math.abs(rW),pd(railD));
      ctx.strokeRect(Math.min(rX,rX+rW),OZ,Math.abs(rW),pd(railD));

      // Rail DIN profil
      const rg2=ctx.createLinearGradient(Math.min(rX,rX+rW),rFaceY,Math.min(rX,rX+rW),rFaceY+rH);
      rg2.addColorStop(0,'#CCC');rg2.addColorStop(.45,'#F5F5F5');rg2.addColorStop(1,'#AAA');
      ctx.fillStyle=rg2;ctx.fillRect(Math.min(rX,rX+rW),rFaceY,Math.abs(rW),rH);
      ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(Math.min(rX,rX+rW),rFaceY,Math.abs(rW),rH);

      // ── Cotes inter ──
      const jeuAv=Math.max(0,Math.round(railFZ));
      const jeuAr=Math.max(0,Math.round(railD-railFZ-RAIL_DIN_H));
      const cX2=Math.max(rX,rX+rW)+8;

      // Jeu avant (vert)
      ctx.strokeStyle='#1D9E75';ctx.fillStyle='#1D9E75';ctx.lineWidth=.6;
      if(pd(jeuAv)>3){
        ctx.beginPath();ctx.moveTo(cX2,OZ);ctx.lineTo(cX2,rFaceY);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cX2-2.5,OZ);ctx.lineTo(cX2+2.5,OZ);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cX2-2.5,rFaceY);ctx.lineTo(cX2+2.5,rFaceY);ctx.stroke();
        if(pd(jeuAv)>14){ctx.save();ctx.translate(cX2+9,(OZ+rFaceY)/2);ctx.rotate(Math.PI/2);ctx.font='bold 7px system-ui';ctx.textAlign='center';ctx.fillText(`jeu av.${jeuAv}mm`,0,0);ctx.restore();}
      }
      // Rail DIN (bleu)
      const rcX=cX2+20;
      ctx.strokeStyle='#4060C0';ctx.fillStyle='#4060C0';ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(rcX,rFaceY);ctx.lineTo(rcX,rFaceY+rH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rcX-2.5,rFaceY);ctx.lineTo(rcX+2.5,rFaceY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rcX-2.5,rFaceY+rH);ctx.lineTo(rcX+2.5,rFaceY+rH);ctx.stroke();
      if(rH>10){ctx.save();ctx.translate(rcX+9,rFaceY+rH/2);ctx.rotate(Math.PI/2);ctx.font='bold 7px system-ui';ctx.textAlign='center';ctx.fillText(`rail ${RAIL_DIN_H}mm`,0,0);ctx.restore();}
      // Jeu arrière (vert)
      ctx.strokeStyle='#1D9E75';ctx.fillStyle='#1D9E75';ctx.lineWidth=.6;
      if(pd(jeuAr)>3){
        ctx.beginPath();ctx.moveTo(cX2,rFaceY+rH);ctx.lineTo(cX2,sectionEndY);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cX2-2.5,rFaceY+rH);ctx.lineTo(cX2+2.5,rFaceY+rH);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cX2-2.5,sectionEndY);ctx.lineTo(cX2+2.5,sectionEndY);ctx.stroke();
        if(pd(jeuAr)>14){ctx.save();ctx.translate(cX2+9,(rFaceY+rH+sectionEndY)/2);ctx.rotate(Math.PI/2);ctx.font='bold 7px system-ui';ctx.textAlign='center';ctx.fillText(`jeu ar.${jeuAr}mm`,0,0);ctx.restore();}
      }
      // Profondeur totale (orange)
      const cX3=cX2+40;
      ctx.strokeStyle='#C85800';ctx.fillStyle='#C85800';ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(cX3,OZ);ctx.lineTo(cX3,sectionEndY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cX3-3,OZ);ctx.lineTo(cX3+3,OZ);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cX3-3,sectionEndY);ctx.lineTo(cX3+3,sectionEndY);ctx.stroke();
      ctx.save();ctx.translate(cX3+11,(OZ+sectionEndY)/2);ctx.rotate(Math.PI/2);
      ctx.font='bold 7px system-ui';ctx.textAlign='center';ctx.fillText(`prof. ${Math.round(railD)}mm`,0,0);ctx.restore();
      // Cote profondeur rail cliquable
      PLAN_COTE_HITS.push({x:cX3+11,y:(OZ+sectionEndY)/2,r:20,val:railD,min:RAIL_DIN_H+6,max:thick-5,
        onSubmit:v=>{ZONE_DEPTHS[zone.label]=Math.round(v);draw();}});

      // ── Drag handles ──
      // Orange = profondeur totale section (bas)
      const isDrg2=planDepthDrag?.zoneLabel===zone.label&&planDepthDrag?.type!=='railZ';
      ctx.strokeStyle=isDrg2?'#C85800':'rgba(200,88,0,.55)';ctx.lineWidth=isDrg2?2:1;ctx.setLineDash([3,2]);
      ctx.beginPath();ctx.moveTo(Math.min(rX,rX+rW),sectionEndY);ctx.lineTo(Math.max(rX,rX+rW),sectionEndY);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=isDrg2?'#C85800':'rgba(200,88,0,.7)';ctx.beginPath();ctx.arc(midX2,sectionEndY,3.5,0,Math.PI*2);ctx.fill();
      // Bleu = position Z rail DIN (face avant rail)
      const isDrg3=planDepthDrag?.zoneLabel===zone.label&&planDepthDrag?.type==='railZ';
      ctx.strokeStyle=isDrg3?'#1A5FD0':'rgba(26,95,208,.6)';ctx.lineWidth=isDrg3?2:1.2;ctx.setLineDash([2,4]);
      ctx.beginPath();ctx.moveTo(Math.min(rX,rX+rW),rFaceY);ctx.lineTo(Math.max(rX,rX+rW),rFaceY);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=isDrg3?'#1A5FD0':'rgba(26,95,208,.8)';ctx.beginPath();ctx.arc(midX2,rFaceY,4,0,Math.PI*2);ctx.fill();

      // Composants en section
      PLACED.filter(p=>p.type==='comp'&&p.railRef?.label===zone.label&&cutY>=p.wy&&cutY<=p.wy+p.comp.modH).forEach(p=>{
        const cx=px(p.wx),cW=pw(p.comp.modW)*(flip?-1:1);
        const cFr=rFaceY-pd(3),cD=rH+pd(6);
        ctx.fillStyle=p.comp.color+'90';ctx.strokeStyle=p.comp.color;ctx.lineWidth=.5;
        ctx.fillRect(Math.min(cx,cx+cW),cFr,Math.abs(cW),cD);
        ctx.strokeRect(Math.min(cx,cx+cW),cFr,Math.abs(cW),cD);
        if(Math.abs(cW)>12){
          const fs=Math.max(5,Math.round(Math.abs(cW)*.12));
          ctx.font=`500 ${fs}px system-ui`;ctx.fillStyle='#fff';ctx.textAlign='center';
          ctx.fillText(p.label||'',Math.min(cx,cx+cW)+Math.abs(cW)/2,cFr+cD/2+fs*.35);
        }
      });

      // Indicateur inclinaison 15° pour rails borniers
      if(zone.sub==='born'){
        ctx.save();
        ctx.strokeStyle='rgba(130,70,20,.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(Math.min(rX,rX+rW),rFaceY);ctx.lineTo(Math.max(rX,rX+rW),rFaceY+rH);ctx.stroke();
        ctx.setLineDash([]);
        ctx.font='bold 7px system-ui';ctx.fillStyle='rgba(100,50,10,.8)';ctx.textAlign='left';
        ctx.fillText('15°',Math.max(rX,rX+rW)+3,rFaceY+rH*.6);
        ctx.restore();
      }
      planViewHandles.push({type:'depth',zoneLabel:zone.label,canvasY:sectionEndY,minD:RAIL_DIN_H+6,maxD:thick-5,scZ,OZ});
      planViewHandles.push({type:'railZ',zoneLabel:zone.label,canvasY:rFaceY,minZ:2,maxZ:railD-RAIL_DIN_H-2,scZ,OZ});
    }
    planViewMeta={OZ,scZ,thick,isAbove,isBelow,cutY,handles:planViewHandles,w,flip,OX};
  }

  // ── Cotation épaisseur
  if(FLAGS.cotes){
    ctx.strokeStyle='#1D9E75';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(OX,OZ-10);ctx.lineTo(OX+pw(w),OZ-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(OX,OZ-14);ctx.lineTo(OX,OZ-6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(OX+pw(w),OZ-14);ctx.lineTo(OX+pw(w),OZ-6);ctx.stroke();
    ctx.font='500 9px system-ui';ctx.fillStyle='#1D9E75';ctx.textAlign='center';
    ctx.fillText(`${layout.w} mm`,OX+pw(w)/2,OZ-13);
    ctx.beginPath();ctx.moveTo(OX+pw(w)+11,OZ);ctx.lineTo(OX+pw(w)+11,OZ+pd(thick));ctx.stroke();
    ctx.beginPath();ctx.moveTo(OX+pw(w)+7,OZ);ctx.lineTo(OX+pw(w)+15,OZ);ctx.stroke();
    ctx.beginPath();ctx.moveTo(OX+pw(w)+7,OZ+pd(thick));ctx.lineTo(OX+pw(w)+15,OZ+pd(thick));ctx.stroke();
    ctx.save();ctx.translate(OX+pw(w)+22,OZ+pd(thick)/2);ctx.rotate(Math.PI/2);
    ctx.textAlign='center';ctx.fillText(`ép.${Math.round(thick)}mm`,0,0);ctx.restore();
    // Cote épaisseur fond → cliquable
    PLAN_COTE_HITS.push({x:OX+pw(w)+22,y:OZ+pd(thick)/2,r:22,val:thick,min:60,max:150,
      onSubmit:v=>{const el=document.getElementById('thickness');el.value=v;el.dispatchEvent(new Event('input'));}});
    // Cote largeur → non modifiable directement
    PLAN_COTE_HITS.push({x:OX+pw(w)/2,y:OZ-13,r:20,val:layout.w,min:600,max:800,
      onSubmit:_=>alert('Modifiez la largeur via le menu "Modèle".')});
  }

  // ── Labels
  const cy3=cutLineY||layout.h/2;
  let posLbl;
  if(cy3<0)posLbl=`+${Math.abs(Math.round(cy3))}mm (hors fond, haut)`;
  else if(cy3>layout.h)posLbl=`-${Math.round(cy3-layout.h)}mm (hors fond, bas)`;
  else posLbl=`${Math.round(layout.h-cy3)}mm du bas`;
  const dirLabel=cutDir>0?'→':'←';
  ctx.font='bold 8.5px system-ui';ctx.fillStyle='#C85800';ctx.textAlign='left';
  ctx.fillText(`Coupe A-A ${dirLabel}  ${posLbl}`,OX,OZ+pd(thick)+15);
  if(isAbove||isBelow)ctx.fillText('(zone hors fond — tôle S3D 1.5mm)',OX,OZ+pd(thick)+26);
  ctx.font='9px system-ui';ctx.fillStyle='#888';ctx.textAlign='right';
  ctx.fillText(`Coupe A-A`,OX+pw(w),OZ+pd(thick)+15);
  // Curseur X synchronisé avec la vue face
  if(faceCursorWX!==null){
    const cxc=px(faceCursorWX);
    ctx.save();ctx.strokeStyle='rgba(200,88,0,.55)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(cxc,OZ-6);ctx.lineTo(cxc,OZ+pd(thick)+6);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
  // Surlignage sélection / survol dans la coupe
  if(!isAbove&&!isBelow){
    [selectedComp,hoveredComp].forEach((p,pi)=>{
      if(!p||p.type!=='comp')return;
      if(cutY<p.wy||cutY>p.wy+p.comp.modH)return;
      const cxL=px(p.wx),cW=pw(p.comp.modW)*(flip?-1:1);
      ctx.save();ctx.strokeStyle=pi===0?'#185FA5':'rgba(24,95,165,.45)';ctx.lineWidth=pi===0?1.8:1;ctx.setLineDash([3,2]);
      ctx.strokeRect(Math.min(cxL,cxL+cW)-2,OZ-2,Math.abs(cW)+4,pd(thick)+4);
      ctx.setLineDash([]);
      if(pi===0){ctx.font='bold 8px system-ui';ctx.fillStyle='#185FA5';ctx.textAlign='center';ctx.fillText(p.label||p.comp.name,Math.min(cxL,cxL+cW)+Math.abs(cW)/2,OZ-5);}
      ctx.restore();
    });
  }
}

// ═══════════════════════════════════════════════════════════════════════
// VUES PLAQUE HAUTE / BASSE (presse-étoupes)
// ═══════════════════════════════════════════════════════════════════════
function drawPlateView(which,layout){
  const{m,w,h,intX,intW}=layout;
  const cvId=which==='top'?'cv-top':'cv-bot';
  const band=which==='top'?'top':'bottom';
  const sc=getSc(),scZ=3; // profondeur plate = m, affiché 3× agrandi
  const PW=Math.round(w*sc)+90,PH=Math.round(m*scZ)+55;
  const cv=document.getElementById(cvId);
  cv.width=PW;cv.height=PH;cv.style.width=PW+'px';cv.style.height=PH+'px';
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,PW,PH);
  const OX=46,OZ=14;
  function px(x){return OX+x*sc}function pw(v){return v*sc}function pd(v){return v*scZ}

  // Tôle
  const tg=ctx.createLinearGradient(OX,OZ,OX,OZ+pd(m));
  tg.addColorStop(0,'#9598A8');tg.addColorStop(1,'#7A7D8C');
  ctx.fillStyle=tg;ctx.fillRect(OX,OZ,pw(w),pd(m));
  ctx.strokeStyle='#565868';ctx.lineWidth=1;ctx.strokeRect(OX,OZ,pw(w),pd(m));

  // Bande intérieure
  ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(px(intX),OZ,pw(intW),pd(m));

  // PE
  PLACED.filter(p=>p.comp?.type==='petoupe'&&p.band===band).forEach(p=>{
    const cx=px(p.wx+p.comp.modW/2),cz=OZ+pd(m/2);
    const r=Math.max(2,pw(p.comp.modW/2));
    // Trou
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(cx,cz,r,0,Math.PI*2);ctx.fill();
    // Corps presse-étoupe
    const rg=ctx.createRadialGradient(cx-r*.2,cz-r*.2,r*.1,cx,cz,r);
    rg.addColorStop(0,'rgba(220,220,220,.8)');rg.addColorStop(.6,'rgba(140,140,140,.8)');
    rg.addColorStop(1,'rgba(80,80,80,.8)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx,cz,r*.85,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#505050';ctx.lineWidth=.7;ctx.beginPath();ctx.arc(cx,cz,r*.85,0,Math.PI*2);ctx.stroke();
    // Label
    const fs=Math.max(5,Math.round(r*.55));
    ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='#FFF';ctx.textAlign='center';
    ctx.fillText(p.label||'PE?',cx,OZ-4);
    ctx.font=`${fs*.85}px system-ui`;ctx.fillStyle='#CCC';
    ctx.fillText(`ISO${p.comp.isoD}`,cx,OZ+pd(m)+12);
  });
  // Label vue
  ctx.font='bold 8.5px system-ui';ctx.fillStyle='#7A7D8C';ctx.textAlign='left';
  ctx.fillText(`Vue plaque ${which==='top'?'haute (GV haut)':'basse (GV bas)'} — Ø perçages PE`,OX,OZ+pd(m)+24);
}

// ═══════════════════════════════════════════════════════════════════════
// VUE PORTE
// ═══════════════════════════════════════════════════════════════════════
function drawDoorView(layout){
  const{m,w,h}=layout;
  const sc=getSc();
  const DW=Math.round(w*sc)+80,DH=Math.round(h*sc)+60;
  const cv=document.getElementById('cv-door');
  cv.width=DW;cv.height=DH;cv.style.width=DW+'px';cv.style.height=DH+'px';
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,DW,DH);
  function sx(v){return 40+v*sc}function sy(v){return 20+v*sc}function sw(v){return v*sc}

  // Porte
  const pg=ctx.createLinearGradient(sx(0),sy(0),sx(w),sy(h));
  pg.addColorStop(0,'#C8D8E8');pg.addColorStop(1,'#A8BCCC');
  ctx.fillStyle=pg;ctx.strokeStyle='#6080A0';ctx.lineWidth=1.5;
  rr(ctx,sx(0),sy(0),sw(w),sw(h),8);ctx.fill();ctx.stroke();

  // Zone signalisation (en haut de la porte, 120mm de haut)
  const zoneH=120;
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.strokeStyle='#8090A0';ctx.lineWidth=.7;
  ctx.setLineDash([4,3]);rr(ctx,sx(m),sy(m),sw(w-2*m),sw(zoneH),4);ctx.fill();ctx.stroke();ctx.setLineDash([]);
  ctx.font='500 9px system-ui';ctx.fillStyle='rgba(80,100,120,.8)';ctx.textAlign='center';
  ctx.fillText('Zone signalisation (voyants)',sx(w/2),sy(m+10));

  // Poignée
  ctx.fillStyle='rgba(200,210,220,.8)';ctx.strokeStyle='#507090';ctx.lineWidth=.7;
  rr(ctx,sx(w-m-14),sy(h/2-40),sw(10),sw(80),3);ctx.fill();ctx.stroke();

  // Voyants posés
  DOOR_PLACED.forEach(p=>{
    if(p.type!=='comp')return;
    drawVoyant(ctx,p,sc,sx,sy);
    if(p===doorHovered||p===doorSelected){
      const cvx=sx(p.wx+p.comp.modW/2),cvy=sy(p.wy+p.comp.modH/2),rv=p.comp.modW*sc/2;
      ctx.strokeStyle=p===doorSelected?'#185FA5':'rgba(24,95,165,.55)';ctx.lineWidth=1.8;ctx.setLineDash([3,2]);
      ctx.beginPath();ctx.arc(cvx,cvy,rv+4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
  });

  // Points d'accrochage (hover porte)
  if(doorHovered){
    getConnPts(doorHovered).forEach(pt=>{
      const[px2,py2]=[sx(0)+pt.wx*sc,sy(0)+pt.wy*sc];
      ctx.fillStyle='rgba(255,140,0,.88)';ctx.beginPath();ctx.arc(px2,py2,5,0,Math.PI*2);ctx.fill();
    });
  }

  // Label
  ctx.font='bold 10px system-ui';ctx.fillStyle='#6B3DA6';ctx.textAlign='center';
  ctx.fillText('VUE PORTE — Glisser voyants depuis bibliothèque',sx(w/2),DH-10);
}

function drawVoyant(ctx,p,sc,sx,sy){
  const c=p.comp;
  const cx=sx(p.wx+c.modW/2),cy=sy(p.wy+c.modH/2);
  const r=c.modW*sc/2;
  // Corps
  const rg=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.05,cx,cy,r);
  rg.addColorStop(0,c.color+'FF');rg.addColorStop(.6,c.color+'CC');
  rg.addColorStop(1,c.color+'88');
  ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  // Anneau
  ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  // Brillance
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(cx-r*.28,cy-r*.28,r*.32,0,Math.PI*2);ctx.fill();
  // Label
  const fs=Math.max(6,Math.round(r*.5));
  ctx.font=`bold ${fs}px system-ui`;ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;
  ctx.strokeText(p.label||'V?',cx,cy+fs*.35);ctx.fillText(p.label||'V?',cx,cy+fs*.35);
}

// ═══════════════════════════════════════════════════════════════════════
// DESSIN FIL
// ═══════════════════════════════════════════════════════════════════════
function drawWire(ctx,wire,sc,layout){
  if(!wire.pts||wire.pts.length<2)return;
  const sec=wire.section,minR=BEND_R[sec]||20;
  const lw=Math.max(1.2,wireR(sec)*sc*2),hl=wire.highlighted;
  const wCol=wire.color||'#C47820';
  // Halo blanc pour visibilité maximale sur tout fond (capot ou fond)
  ctx.strokeStyle=hl?'rgba(255,180,0,.7)':'rgba(255,255,255,0.75)';
  ctx.lineWidth=lw+3;ctx.lineCap='round';ctx.lineJoin='round';
  drawSpline(ctx,wire.pts,minR,sc);ctx.stroke();
  // Fil couleur réelle
  ctx.strokeStyle=hl?'#FF9500':wCol;ctx.lineWidth=lw;
  drawSpline(ctx,wire.pts,minR,sc);ctx.stroke();
  ctx.lineCap='butt';
  // Points départ/arrivée
  [[wire.pts[0][0],wire.pts[0][1]],[wire.pts[wire.pts.length-1][0],wire.pts[wire.pts.length-1][1]]].forEach(([wx2,wy2])=>{
    const[px,py]=W2F(wx2,wy2);
    ctx.fillStyle=hl?'#FF9500':'#8B5C00';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
  });
  // Points intermédiaires : toujours visibles (petits), grands+numérotés si surligné
  if(wire.pts.length>2){
    wire.pts.slice(1,-1).forEach((pt,idx)=>{
      const[mx,my]=W2F(pt[0],pt[1]);
      if(hl){
        // Grand handle orange avec numéro
        ctx.fillStyle='rgba(255,145,0,.95)';ctx.strokeStyle='rgba(255,255,255,.92)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.fill();ctx.stroke();
        ctx.font='bold 6px system-ui';ctx.fillStyle='#fff';ctx.textAlign='center';
        ctx.fillText(idx+2,mx,my+2.2);
      } else {
        // Petit point discret toujours visible
        ctx.fillStyle='rgba(160,90,10,.55)';ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(mx,my,2.5,0,Math.PI*2);ctx.fill();ctx.stroke();
      }
    });
  }
  // Label Wn
  const fs=Math.max(7,Math.round(7*Math.min(getSc()*1.8,1)));
  const[lx,ly]=W2F(wire.pts[0][0],wire.pts[0][1]);
  ctx.font=`bold ${fs}px system-ui`;
  ctx.strokeStyle='rgba(255,255,255,.92)';ctx.lineWidth=2.5;ctx.strokeText(`${wire.id} ${sec}mm²`,lx+3,ly-4);
  ctx.fillStyle=hl?'#CC5500':'#5A2E00';ctx.fillText(`${wire.id} ${sec}mm²`,lx+3,ly-4);
}

// ═══════════════════════════════════════════════════════════════════════
// DESSIN COMPOSANT
// ═══════════════════════════════════════════════════════════════════════
function drawComp(ctx,p,sc){
  const c=p.comp;const[px2,py]=W2F(p.wx,p.wy);const cw=c.modW*sc,ch=c.modH*sc;
  if(p===dragging)ctx.globalAlpha=.6;
  if(p===hoveredComp&&p!==selectedComp){ctx.save();ctx.strokeStyle='rgba(24,95,165,.4)';ctx.lineWidth=2;ctx.setLineDash([]);rr(ctx,px2-2,py-2,cw+4,ch+4,5);ctx.stroke();ctx.restore();}
  if(c.type==='petoupe'){
    // ── Coupe verticale presse-étoupe (profil vu de face)
    const cx=px2+cw/2;
    const band=p.band||'top';
    const topOut=band==='top'; // le câble sort par le haut
    // Gradient métalique (reflet cylindrique horizontal)
    const mg=ctx.createLinearGradient(px2,py,px2+cw,py);
    mg.addColorStop(0,'#555');mg.addColorStop(.2,'#AAA');mg.addColorStop(.5,'#E2E2E2');
    mg.addColorStop(.8,'#AAA');mg.addColorStop(1,'#555');
    // Corps principal
    ctx.fillStyle=mg;ctx.strokeStyle='#404040';ctx.lineWidth=.7;
    ctx.fillRect(px2,py,cw,ch);ctx.strokeRect(px2,py,cw,ch);
    // Écrou hexagonal (côté extérieur)
    const nutH=Math.max(3,ch*.3),nutW=cw*1.35;
    const nutY=topOut?py:py+ch-nutH;
    ctx.fillStyle='#909090';ctx.strokeStyle='#555';ctx.lineWidth=.6;
    ctx.fillRect(cx-nutW/2,nutY,nutW,nutH);ctx.strokeRect(cx-nutW/2,nutY,nutW,nutH);
    // Facettes hex
    [.25,.75].forEach(f=>{ctx.beginPath();ctx.moveTo(cx-nutW/2+nutW*f,nutY);ctx.lineTo(cx-nutW/2+nutW*f,nutY+nutH);ctx.stroke();});
    // Filetage (stries horizontales sur le corps)
    ctx.strokeStyle='rgba(90,90,90,.35)';ctx.lineWidth=.35;
    const threadStart=topOut?nutY+nutH:py,threadEnd=topOut?py+ch:nutY;
    for(let ty=threadStart+1.5;ty<threadEnd-1;ty+=(threadEnd-threadStart)*0.18){
      ctx.beginPath();ctx.moveTo(px2+1,ty);ctx.lineTo(px2+cw-1,ty);ctx.stroke();
    }
    // Orifice câble (côté extérieur)
    const holeR=cw*.3,holeCY=topOut?py+holeR*.9:py+ch-holeR*.9;
    ctx.fillStyle='#1A1A1A';ctx.beginPath();ctx.arc(cx,holeCY,holeR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=.4;ctx.beginPath();ctx.arc(cx,holeCY,holeR,0,Math.PI*2);ctx.stroke();
    // Anneau interne câble
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.arc(cx,holeCY,holeR*.5,0,Math.PI*2);ctx.stroke();
    // Label
    if(cw>7){
      const fs=Math.max(5,Math.round(cw*.38));
      ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='#fff';ctx.textAlign='center';
      ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;
      ctx.strokeText(p.label||'PE',cx,py+ch*.58+fs*.35);
      ctx.fillText(p.label||'PE',cx,py+ch*.58+fs*.35);
    }
  } else if(c.type==='bornier'){
    ctx.fillStyle='#FEFAF0';ctx.strokeStyle=c.color;ctx.lineWidth=Math.max(.5,cw*.07);
    rr(ctx,px2,py,cw,ch,Math.max(1,cw*.14));ctx.fill();ctx.stroke();
    ctx.fillStyle=c.color;
    rr(ctx,px2+cw*.08,py+ch*.04,cw*.84,ch*.11,1);ctx.fill();
    rr(ctx,px2+cw*.08,py+ch*.85,cw*.84,ch*.11,1);ctx.fill();
    const vr=Math.max(1,cw*.27);
    ctx.fillStyle=c.color+'CC';ctx.beginPath();ctx.arc(px2+cw/2,py+ch*.5,vr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=Math.max(.3,cw*.05);
    ctx.beginPath();ctx.moveTo(px2+cw*.28,py+ch*.5);ctx.lineTo(px2+cw*.72,py+ch*.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px2+cw/2,py+ch*.37);ctx.lineTo(px2+cw/2,py+ch*.63);ctx.stroke();
    if(cw>8){
      const fs=Math.max(5,Math.round(ch*.1));
      ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='#3A1800';ctx.textAlign='center';
      ctx.fillText(p.label||'B?',px2+cw/2,py+ch*.27);
    }
  } else {
    ctx.fillStyle=c.color+'1A';ctx.strokeStyle=c.color;ctx.lineWidth=.9;
    rr(ctx,px2,py,cw,ch,3);ctx.fill();ctx.stroke();
    if(c.type==='disj'||c.type==='diff'||c.type==='sect'){
      const pw2=cw/c.poles;
      for(let pi=0;pi<c.poles;pi++){
        const ppx=px2+pi*pw2;
        ctx.fillStyle='#D8D6D2';ctx.strokeStyle=c.color;ctx.lineWidth=.35;
        rr(ctx,ppx+pw2*.15,py+ch*.07,pw2*.7,ch*.19,2);ctx.fill();ctx.stroke();
        rr(ctx,ppx+pw2*.15,py+ch*.73,pw2*.7,ch*.19,2);ctx.fill();ctx.stroke();
        if(c.type!=='sect'){
          ctx.fillStyle=c.type==='diff'?'#B0E8D0':'#FAC0A8';
          ctx.strokeStyle=c.type==='diff'?'#0F6E56':'#993C1D';ctx.lineWidth=.35;
          rr(ctx,ppx+pw2*.2,py+ch*.36,pw2*.6,ch*.26,2);ctx.fill();ctx.stroke();
        }
        if(c.type==='disj'){ctx.fillStyle='#185FA5';ctx.beginPath();ctx.arc(ppx+pw2/2,py+ch*.49,Math.max(1.5,pw2*.11),0,Math.PI*2);ctx.fill();}
      }
      const fs=Math.max(6,Math.round(Math.min(cw,54)*.11));
      ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle=c.color;ctx.textAlign='center';
      ctx.fillText(p.label||c.name,px2+cw/2,py+ch-4);
    } else if(c.type==='peigne'){
      ctx.fillStyle='#F0997B';ctx.strokeStyle='#993C1D';ctx.lineWidth=.5;
      rr(ctx,px2,py,cw,ch,1);ctx.fill();ctx.stroke();
      const pw2=cw/c.poles;
      for(let pi=0;pi<c.poles;pi++){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px2+pi*pw2+pw2/2,py+ch/2,Math.max(1.5,ch*.28),0,Math.PI*2);ctx.fill();}
    } else if(c.type==='repot'){
      // Répartiteur de potentiel monopotentiel
      const N=c.poles;
      const stagPx=Math.min(sw(30),sw((N-1)*4)); // décalage total en pixels
      const step=N>1?stagPx/(N-1):0;
      const pw2=cw/N;
      // ── Queues de sortie décalées (dessinées AVANT le corps pour rester derrière)
      ctx.strokeStyle='rgba(160,80,0,.5)';ctx.lineWidth=.8;
      for(let pi=0;pi<N;pi++){
        const cx2=px2+(pi+.5)*pw2, tailY=py+ch+pi*step;
        ctx.beginPath();ctx.moveTo(cx2,py+ch);ctx.lineTo(cx2,tailY);ctx.stroke();
      }
      // Queue entrée (haut)
      ctx.beginPath();ctx.moveTo(px2+cw/2,py);ctx.lineTo(px2+cw/2,py-Math.max(4,ch*.4));ctx.stroke();
      // ── Corps
      const bg2=ctx.createLinearGradient(px2,py,px2,py+ch);
      bg2.addColorStop(0,'#E8A040');bg2.addColorStop(1,'#B06000');
      ctx.fillStyle=bg2;ctx.strokeStyle='#804800';ctx.lineWidth=.7;
      rr(ctx,px2,py,cw,ch,2);ctx.fill();ctx.stroke();
      // Plots (vis)
      for(let pi=0;pi<N;pi++){
        const cx2=px2+(pi+.5)*pw2;
        ctx.fillStyle='rgba(0,0,0,.3)';ctx.strokeStyle='#804800';ctx.lineWidth=.4;
        rr(ctx,px2+pi*pw2+.8,py+ch*.1,pw2-1.6,ch*.8,1);ctx.fill();ctx.stroke();
        ctx.fillStyle='#1A1A1A';ctx.beginPath();ctx.arc(cx2,py+ch*.5,Math.max(1,pw2*.17),0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.4;ctx.beginPath();ctx.arc(cx2,py+ch*.5,Math.max(1,pw2*.17),0,Math.PI*2);ctx.stroke();
      }
      // ── Points de connexion décalés (petits cercles orange au bout des queues)
      for(let pi=0;pi<N;pi++){
        const cx2=px2+(pi+.5)*pw2, tailY=py+ch+pi*step;
        ctx.fillStyle='rgba(220,110,0,.88)';ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(cx2,tailY,2.2,0,Math.PI*2);ctx.fill();ctx.stroke();
      }
      // Point entrée (haut)
      ctx.fillStyle='rgba(180,80,0,.88)';ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(px2+cw/2,py-Math.max(4,ch*.4),2.5,0,Math.PI*2);ctx.fill();ctx.stroke();
      // ── Label
      if(cw>20){
        const fs=Math.max(5,Math.round(ch*.36));
        ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='rgba(255,255,255,.9)';ctx.textAlign='center';
        ctx.fillText(p.label||`${N}P`,px2+cw/2,py+ch*.55+fs*.35);
      }
    } else if(c.type==='repartiteur'){
      // Corps
      ctx.fillStyle='#B8B0F0';ctx.strokeStyle='#534AB7';ctx.lineWidth=.7;
      rr(ctx,px2,py,cw,ch,3);ctx.fill();ctx.stroke();
      // 4 barreaux de puissance colorés : Ph3(brun), Ph2(noir), Ph1(rouge/gris), N(bleu)
      const barLabels=['Ph3','Ph2','Ph1','N'];
      const barColors=['#6D3B1E','#1A1A1A','#808080','#0040C0'];
      const bh=ch/4;
      barColors.forEach((bc,bi)=>{
        const gy=py+bi*bh;
        const bg=ctx.createLinearGradient(px2,gy,px2,gy+bh);
        bg.addColorStop(0,bc+'CC');bg.addColorStop(1,bc+'88');
        ctx.fillStyle=bg;rr(ctx,px2+3,gy+2,cw-6,bh-4,2);ctx.fill();
        ctx.strokeStyle=bc;ctx.lineWidth=.5;rr(ctx,px2+3,gy+2,cw-6,bh-4,2);ctx.stroke();
        if(cw>25){
          const fs=Math.max(6,Math.round(bh*.38));
          ctx.font=`600 ${fs}px system-ui`;ctx.fillStyle='#fff';ctx.textAlign='center';
          ctx.fillText(barLabels[bi],px2+cw/2,gy+bh*.5+fs*.35);
        }
      });
      // Label repère
      if(p.label&&p.label!==c.name){
        const fs=Math.max(6,Math.round(cw*.13));
        ctx.font=`500 ${fs}px system-ui`;ctx.fillStyle='rgba(255,255,255,.8)';ctx.textAlign='center';
        ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.5;
        ctx.strokeText(p.label,px2+cw/2,py+ch+fs+2);ctx.fillStyle='#534AB7';
        ctx.fillText(p.label,px2+cw/2,py+ch+fs+2);
      }
    }
  }
  ctx.globalAlpha=1;
}

function drawCotes(ctx,sx,sy,sw,w,h,m,intX,intW,zones,sc,espR){
  COTE_HITS.length=0;
  const C='#1D9E75';ctx.strokeStyle=C;ctx.fillStyle=C;
  function dimH(x,y1,y2,lbl,big){
    if(Math.abs(y2-y1)<3)return;
    const fs=big?Math.max(7,Math.round(sc*19)):Math.max(6,Math.round(sc*15));
    ctx.lineWidth=big?.8:.4;ctx.setLineDash(big?[]:[2,2]);
    ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(x-3,y1);ctx.lineTo(x+3,y1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-3,y2);ctx.lineTo(x+3,y2);ctx.stroke();
    ctx.save();ctx.translate(x-(big?10:7),(y1+y2)/2);ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';ctx.font=`${big?'600 ':''}${fs}px system-ui`;ctx.fillText(lbl,0,0);ctx.restore();
  }
  function dimW(y,x1,x2,lbl,big){
    const fs=big?Math.max(7,Math.round(sc*19)):Math.max(6,Math.round(sc*15));
    ctx.lineWidth=big?.8:.4;ctx.setLineDash(big?[]:[2,2]);
    ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(x1,y-3);ctx.lineTo(x1,y+3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x2,y-3);ctx.lineTo(x2,y+3);ctx.stroke();
    ctx.textAlign='center';ctx.font=`${big?'600 ':''}${fs}px system-ui`;
    ctx.fillText(lbl,(x1+x2)/2,y-(big?6:4));
  }
  // Cotation H totale (gauche) — cliquable → non éditable directement (modèle)
  dimW(sy(0)-24,sx(0),sx(w),`${w} mm`,true);
  dimW(sy(0)-13,sx(intX),sx(intX+intW),`${intW} mm`,false);
  dimH(sx(0)-34,sy(0),sy(h),`${h} mm`,true);
  const ex=sx(w)+22;
  zones.forEach(z=>{
    const cx=ex+(z.type==='rail'?13:0);
    const cy=(sy(z.y)+sy(z.y+z.h))/2;
    dimH(cx,sy(z.y),sy(z.y+z.h),`${z.h}`,false);
    if(z.type==='goulH'){
      // Cote hauteur GH → édite le champ gh-h
      COTE_HITS.push({x:cx-10,y:cy,r:20,val:z.h,min:20,max:200,
        onSubmit:v=>{const el=document.getElementById('gh-h');el.value=v;el.dispatchEvent(new Event('input'));draw();}});
    } else if(z.type==='rail'){
      // Cote hauteur rail → non modifiable (fixe RAIL_H), mais affiche l'espacement
    }
  });
  // Cote hauteur totale (gauche) — édite nb-app via prompt simplifié
  COTE_HITS.push({x:sx(0)-34,y:(sy(0)+sy(h))/2,r:20,val:h,min:600,max:2000,
    onSubmit:_=>alert('Modifiez la hauteur via le menu "Modèle".')});
  // Cote espacement rails (bas de chaque zone rail, côté droit)
  zones.filter(z=>z.type==='rail').forEach(z=>{
    const cx=ex+13+14,cy=(sy(z.y)+sy(z.y+z.h))/2;
    COTE_HITS.push({x:cx,y:cy,r:16,val:espR,min:0,max:50,
      onSubmit:v=>{const el=document.getElementById('esp-r');el.value=v;el.dispatchEvent(new Event('input'));}});
  });
}
